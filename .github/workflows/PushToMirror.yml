name: Push to Mirror

on:
  push:
    branches:
      - main

env:
  MIRROR_URL: "git@github.com:EpitechPGE1-2025/G-PSU-200-STG-2-1-42sh-9.git"

jobs:
  check_norm:
    name: Check Coding Style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run coding style checker
        run: banana-check-repo

      - name: Display coding style errors
        if: always()
        run: |
          if [ -f coding-style-reports.log ] && [ -s coding-style-reports.log ]; then
            while IFS=":" read -r file line severity code; do
              file="${file#./}"
              echo "::error file=${file},line=${line},title=${severity} coding style error::${code}"
            done < coding-style-reports.log
            exit 1
          fi

  push_to_mirror:
    name: Push to Epitech
    runs-on: ubuntu-latest
    needs: check_norm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: Mirror to Epitech repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
